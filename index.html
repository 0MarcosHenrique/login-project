<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/media-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="image">
                
            </div>
            <div id="formu">
                <h1>Login</h1>
                <p>Welcome back. Please log in to access your account and configure your environment.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div class="camp">
                        <span class="material-symbols-outlined">person</span>
                        <input type="email" name="Login" id="ilogin" placeholder="Your email..." autocomplete="email" required maxlength="30">
                        <label for="ilogin">Login:</label>
                    <div class="camp">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <input type="password" name="Password" id="ipassword" placeholder="Your password..." autocomplete="current-password" required minlength="8" maxlength="15">
                        <label for="ipassword">Password:</label>
                    </div>
                    <input type="submit" value="Enter">
                    <a class="button" href="forget.html">
                        I forgot my password. <span class="material-symbols-outlined">mail</span>
                    </a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
